version: '3.8'

services:
  database:
    image: postgres:15-alpine 
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: product_owner
      POSTGRES_PASSWORD: ownerpassword
      POSTGRES_DB: produtos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U product_owner -d produtos_db"]
      interval: 5s      
      timeout: 5s       
      retries: 10        
      start_period: 10s

  db_test:
    image: postgres:15-alpine
    container_name: postgres_ecommerce_test
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: senha_test_123
      POSTGRES_DB: ecommerce_test
    ports:
      - "5433:5432"  
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce_test"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data: