version: '3.8'

services:
  database:
    image: postgres:15-alpine 
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: product_owner
      POSTGRES_PASSWORD: ownerpassword
      POSTGRES_DB: produtos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U product_owner -d produtos_db"]
      interval: 5s      
      timeout: 5s       
      retries: 10        
      start_period: 10s

volumes:
  postgres_data: