version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: prod_db_container
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-product_owner}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ownerpassword}
      POSTGRES_DB: ${DB_NAME:-produtos_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-product_owner} -d ${DB_NAME:-produtos_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_test:
    image: postgres:15-alpine
    container_name: test_db_container
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-product_owner}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ownerpassword}
      POSTGRES_DB: db_test
    ports:
      - "5433:5432"

  api:
    build: .
    container_name: fastapi_api_container
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DB_USER=${DB_USER:-product_owner}
      - DB_PASSWORD=${DB_PASSWORD:-ownerpassword}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-produtos_db}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: